services:
  - type: web
    name: gramgpt-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: AI_PROVIDER
        value: cerebras
      - key: CEREBRAS_API_KEY
        sync: false
      - key: CEREBRAS_BASE_URL
        value: https://api.cerebras.ai/v1
      - key: SECRET_KEY
        generateValue: true
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_PHONE
        sync: false
