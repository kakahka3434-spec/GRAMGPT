<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRAMGPT — Шаблоны</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header animate-in">
        <h2><i class="fas fa-store" style="color: var(--primary)"></i> Шаблоны</h2>
        <a href="index.html" style="color: var(--text-secondary); text-decoration: none; font-size: 14px;">
            <i class="fas fa-arrow-left"></i> Назад
        </a>
    </div>

    <!-- Categories -->
    <div class="cat-scroll animate-in" style="animation-delay: 0.05s">
        <button class="cat-btn active" onclick="selectCat(this)">Все</button>
        <button class="cat-btn" onclick="selectCat(this)"><i class="fab fa-bitcoin"></i> Крипто</button>
        <button class="cat-btn" onclick="selectCat(this)"><i class="fas fa-shopping-cart"></i> E-comm</button>
        <button class="cat-btn" onclick="selectCat(this)"><i class="fas fa-laptop-code"></i> IT/SaaS</button>
        <button class="cat-btn" onclick="selectCat(this)"><i class="fas fa-graduation-cap"></i> Обучение</button>
    </div>

    <!-- Featured -->
    <div class="glass-card animate-in" style="animation-delay: 0.1s" id="featured-template">
        <div class="empty-state"><i class="fas fa-store"></i><h4>Нет шаблонов</h4><p>Шаблоны появятся в маркетплейсе</p></div>
    </div>

    <!-- Template Grid -->
    <div class="section-title animate-in" style="animation-delay: 0.13s">Все шаблоны</div>

    <div class="tmpl-list" id="templates-list">
        <div class="empty-state"><i class="fas fa-store"></i><h4>Нет шаблонов</h4><p>Проверьте подключение к маркетплейсу</p></div>
    </div>

    <div class="nav-bar animate-in" style="animation-delay: 0.3s">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="campaigns.html" class="nav-item"><i class="fas fa-tasks"></i></a>
        <a href="channel.html" class="nav-item"><i class="fas fa-tv"></i></a>
        <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i></a>
    </div>

    <style>
        .cat-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 16px; }
        .cat-btn { padding: 8px 14px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .cat-btn.active { background: rgba(0,136,204,0.1); border-color: var(--primary); color: var(--primary); }
        .tmpl-icon-lg { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: rgba(0,136,204,0.1); color: var(--primary); flex-shrink: 0; }
        .tmpl-tag { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: rgba(48,54,61,0.6); color: var(--text-secondary); font-weight: 500; }
        .tmpl-list { display: flex; flex-direction: column; gap: 8px; }
        .tmpl-card { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; cursor: pointer; transition: border-color 0.2s; }
        .tmpl-card:active { border-color: var(--primary); }
        .tmpl-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    </style>

    <script src='main.js'></script>
    <script>
        function selectCat(btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        function useTemplate(name) { toast('success', 'Шаблон', 'Установка: ' + name); }
        function previewTemplate(name) { toast('info', 'Предпросмотр', name); }
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const data = await api.get('/templates');
                var templates = data && data.templates ? data.templates : [];
                if (templates.length > 0) {
                    var feat = templates[0];
                    document.getElementById('featured-template').innerHTML = '<div style="display:flex;align-items:center;gap:4px;margin-bottom:8px;"><i class="fas fa-star" style="color:var(--warning);font-size:12px;"></i><span style="font-size:11px;font-weight:600;color:var(--warning);">POPULAR</span></div><div style="display:flex;gap:14px;"><div class="tmpl-icon-lg"><i class="fas fa-file"></i></div><div style="flex:1;"><div style="font-size:15px;font-weight:700;">' + escapeHtml(feat.name || '') + '</div><div style="font-size:11px;color:var(--text-secondary);margin:4px 0 8px;">' + escapeHtml(feat.description || '') + '</div><div style="display:flex;gap:6px;flex-wrap:wrap;"><span class="tmpl-tag">' + (feat.steps || '?') + ' этапов</span><span class="tmpl-tag">' + (feat.price || 'Free') + '</span></div></div></div><div style="display:flex;gap:8px;margin-top:14px;"><button class="btn" style="flex:2;font-size:12px;padding:10px;" onclick="useTemplate(\'' + feat.id + '\')"><i class="fas fa-download"></i> Установить</button><button class="btn btn-secondary" style="flex:1;font-size:12px;padding:10px;" onclick="previewTemplate(\'' + feat.id + '\')"><i class="fas fa-eye"></i> Обзор</button></div>';
                    var listHtml = '';
                    for (var i = 1; i < templates.length; i++) {
                        var t = templates[i];
                        listHtml += '<div class="tmpl-card" onclick="useTemplate(\'' + t.id + '\')"><div class="tmpl-icon" style="background:rgba(0,136,204,0.1);"><i class="fas fa-file"></i></div><div style="flex:1;"><div style="font-size:13px;font-weight:600;">' + escapeHtml(t.name || '') + '</div><div style="font-size:10px;color:var(--text-secondary);">' + escapeHtml(t.description || '') + '</div></div><div style="text-align:right;"><div style="font-size:12px;font-weight:700;color:var(--primary);">' + (t.price || 'Free') + '</div></div></div>';
                    }
                    document.getElementById('templates-list').innerHTML = listHtml;
                }
            } catch (e) { console.warn('Templates API error:', e); }
        });
        function escapeHtml(str) {
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
</body>
</html>
