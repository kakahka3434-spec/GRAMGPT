<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки - GRAMGPT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header animate-in">
        <a href="index.html" style="color: inherit; text-decoration: none;"><i class="fas fa-arrow-left"></i></a>
        <h2>Настройки</h2>
        <div></div>
    </div>

    <div class="card animate-in" style="animation-delay: 0.05s">
        <h3>Ваш Тариф: <span style="color: var(--primary);">PRO</span></h3>
        <div class="setting-item"><span class="text-sm">Модель ИИ</span>
            <select class="form-select" style="width:auto">
                <option>GPT-4o</option>
                <option>GPT-4o-mini</option>
            </select>
        </div>
        <div class="setting-item"><span class="text-sm">Мульти-аккаунты</span><span style="color: var(--primary);" id="account-count">0</span></div>
        <div class="setting-item"><span class="text-sm">Human Emulation</span><span class="status-badge badge-green">Активен</span></div>
        <div class="setting-item"><span class="text-sm">Anti-Ban Shield</span><span class="status-badge badge-green">Активен</span></div>
    </div>

    <div class="card animate-in" style="animation-delay: 0.1s">
        <h3>Платежи (TON Connect)</h3>
        <p class="text-sm text-secondary mb-12">Подключите TON кошелёк для оплаты подписки и покупки шаблонов.</p>
        <button class="btn" onclick="connectTON()"><i class="fas fa-gem"></i> Подключить TON Wallet</button>
    </div>

    <div class="card animate-in" style="animation-delay: 0.15s">
        <h3>Реферальная программа</h3>
        <p class="text-sm text-secondary mb-8">Приглашайте друзей и получайте +20% к лимитам.</p>
        <button class="btn btn-secondary" onclick="getReferralLink()"><i class="fas fa-share"></i> Получить ссылку</button>
    </div>

    <div class="nav-bar animate-in" style="animation-delay: 0.2s">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="campaigns.html" class="nav-item"><i class="fas fa-tasks"></i></a>
        <a href="channel.html" class="nav-item"><i class="fas fa-tv"></i></a>
        <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i></a>
        <a href="settings.html" class="nav-item active"><i class="fas fa-cog"></i></a>
    </div>

    <script src="main.js"></script>
    <script>
        function connectTON() { toast('info', 'Подключение TON', 'Выберите кошелёк для подключения'); }
        function getReferralLink() { toast('success', 'Ссылка скопирована', 'Отправьте друзьям: gramgpt.io/ref/your_id'); }
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const [status, accounts] = await Promise.all([api.get('/status'), api.get('/accounts').catch(() => ({}))]);
                var totalAcc = (accounts && accounts.total) || (accounts && accounts.accounts && accounts.accounts.length) || 0;
                document.getElementById('account-count').textContent = totalAcc + ' / 20';
                if (status) {
                    const items = document.querySelectorAll('.setting-item');
                    if (items[0]) items[0].querySelector('select') && (items[0].querySelector('select').value = status.ai_model || 'GPT-4o');
                }
            } catch (e) { console.warn('Settings API error:', e); }
        });
    </script>
</body>
</html>
