<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика - GRAMGPT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header animate-in">
        <a href="index.html" style="color: inherit; text-decoration: none;"><i class="fas fa-arrow-left"></i></a>
        <h2>Аналитика</h2>
        <div></div>
    </div>

    <div class="stat-row animate-in" style="animation-delay: 0.05s">
        <div style="display: flex; justify-content: space-between;">
            <div class="stat-item">
                <h4>Конверсия</h4>
                <div style="color: var(--success-color)">+34%</div>
            </div>
            <div class="stat-item" style="text-align: center;">
                <h4>Новых лидов</h4>
                <div style="color: var(--accent-color)">1.2K</div>
            </div>
            <div class="stat-item" style="text-align: right;">
                <h4>Вовлечённость</h4>
                <div style="color: var(--success-color)">89%</div>
            </div>
        </div>
    </div>

    <div class="card animate-in" style="animation-delay: 0.1s">
        <h3>Воронка продаж</h3>
        <div style="margin: 12px 0;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px;">
                <span>Парсинг</span>
                <span style="color: var(--accent-color)">2,450 контактов</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width: 100%"></div></div>
        </div>
        <div style="margin: 12px 0;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px;">
                <span>Прогрев</span>
                <span style="color: var(--accent-color)">1,800 активных</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width: 73%"></div></div>
        </div>
        <div style="margin: 12px 0;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px;">
                <span>Нейрочаттинг</span>
                <span style="color: var(--accent-color)">890 диалогов</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width: 36%"></div></div>
        </div>
        <div style="margin: 12px 0;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px;">
                <span>Конверсия</span>
                <span style="color: var(--success-color)">125 лидов</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width: 12%; background: var(--success-color)"></div></div>
        </div>
    </div>

    <div class="card animate-in" style="animation-delay: 0.15s">
        <h3>Безопасность</h3>
        <div style="margin-bottom: 12px;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px;">
                <span>Risk Score</span>
                <span style="color: var(--success-color)">Низкий (12/100)</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width: 12%; background: var(--success-color)"></div></div>
        </div>
        <div>
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px;">
                <span>Банов за 30 дней</span>
                <span style="color: var(--success-color)">0</span>
            </div>
        </div>
    </div>

    <div class="nav-bar animate-in" style="animation-delay: 0.2s">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="campaigns.html" class="nav-item"><i class="fas fa-tasks"></i></a>
        <a href="dashboard.html" class="nav-item active"><i class="fas fa-chart-pie"></i></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i></a>
    </div>

    <script>
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
