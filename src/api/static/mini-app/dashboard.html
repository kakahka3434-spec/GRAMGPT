<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - GPTGRAM Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .progress-bar { background: #e0e0e0; border-radius: 10px; height: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--primary-color); height: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" style="color: inherit;"><i class="fas fa-arrow-left"></i></a>
        <h2>Аналитика 📊</h2>
        <div></div>
    </div>

    <div class="card animate-in">
        <h3>Воронка продаж (3D)</h3>
        <div style="height: 200px; background: #f9f9f9; border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 2px dashed #ddd;">
            <p style="color: #999">Визуализация загружается...</p>
        </div>
    </div>

    <div class="card animate-in" style="animation-delay: 0.1s">
        <h3>Эффективность аккаунтов</h3>
        <div style="margin-bottom: 15px;">
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
                <span>Безопасность (Risk Score)</span>
                <span style="color: #2ecc71">Низкий (12/100)</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width: 12%; background: #2ecc71"></div></div>
        </div>
        <div>
            <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px;">
                <span>Конверсия в ответ</span>
                <span>18.5%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width: 18.5%"></div></div>
        </div>
    </div>

    <div class="nav-bar">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="campaigns.html" class="nav-item"><i class="fas fa-tasks"></i></a>
        <a href="dashboard.html" class="nav-item active"><i class="fas fa-chart-pie"></i></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i></a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
    </script>
</body>
</html>
