<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRAMGPT — Нейрокомментинг</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header animate-in">
        <h2><i class="fas fa-comments" style="color: var(--primary)"></i> Нейрокомментинг</h2>
        <a href="index.html" class="text-secondary" style="text-decoration: none; font-size: 14px;">
            <i class="fas fa-arrow-left"></i> Назад
        </a>
    </div>

    <!-- Status -->
    <div class="stat-row animate-in" style="animation-delay: 0.05s">
        <div class="flex" style="justify-content: space-between;">
            <div class="stat-item">
                <h4>Комментариев</h4>
                <div style="color: var(--primary); font-size: 22px; font-weight: 800;" id="comment-stats-total">0</div>
            </div>
            <div class="stat-item text-center">
                <h4>Каналов</h4>
                <div style="font-size: 22px; font-weight: 800;" id="comment-stats-channels">0</div>
            </div>
            <div class="stat-item" style="text-align: right">
                <h4>Вовлечённость</h4>
                <div style="color: var(--success); font-size: 22px; font-weight: 800;" id="comment-stats-engage">0%</div>
            </div>
        </div>
    </div>

    <!-- Settings -->
    <div class="card animate-in" style="animation-delay: 0.1s">
        <h4 class="mb-12">Настройки генерации</h4>
        <div class="form-group">
            <label class="form-label">Целевые каналы</label>
            <input type="text" class="form-input" id="comment-channels" placeholder="@channel1, @channel2">
        </div>
        <div class="form-group">
            <label class="form-label">Тон комментариев</label>
            <div class="btn-option-grid">
                <button class="btn-option active" onclick="selectTone(this)">Экспертный</button>
                <button class="btn-option" onclick="selectTone(this)">Дружелюбный</button>
                <button class="btn-option" onclick="selectTone(this)">Провокационный</button>
            </div>
        </div>
        <div class="flex gap-8">
            <div class="flex-1">
                <label class="form-label">Модель</label>
                <select class="form-select" id="comment-model">
                    <option value="gpt-4o-mini">GPT-4o-mini</option>
                    <option value="gpt-4o" selected>GPT-4o</option>
                </select>
            </div>
            <div class="flex-1">
                <label class="form-label">Частота</label>
                <select class="form-select" id="comment-frequency">
                    <option value="every">Каждый пост</option>
                    <option value="every_2nd" selected>Каждый 2-й</option>
                    <option value="every_5th">Каждый 5-й</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Activity Log -->
    <div class="card animate-in" style="animation-delay: 0.15s">
        <div class="card-header">
            <h4>Последние комментарии</h4>
            <span class="indicator indicator-green" id="comment-indicator"><i class="fas fa-circle"></i> Загрузка...</span>
        </div>
        <div id="comment-log">
            <div class="empty-state"><i class="fas fa-comments"></i><h4>Нет комментариев</h4><p>Запустите нейрокомментинг, чтобы увидеть результат</p></div>
        </div>
    </div>

    <button class="btn animate-in" style="animation-delay: 0.2s" onclick="toggleCommenting()">
        <i class="fas fa-play"></i> Запустить нейрокомментинг
    </button>

    <div class="nav-bar animate-in" style="animation-delay: 0.25s">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="campaigns.html" class="nav-item"><i class="fas fa-tasks"></i></a>
        <a href="channel.html" class="nav-item"><i class="fas fa-tv"></i></a>
        <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i></a>
    </div>

    <script src="main.js"></script>
    <script>
        function selectTone(btn) {
            document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            haptic('light');
        }
        async function toggleCommenting() {
            haptic('medium');
            const channels = document.getElementById('comment-channels').value.trim();
            if (!channels) {
                toast('warning', 'Укажите каналы', 'Введите целевые каналы для комментирования');
                return;
            }
            const activeTone = document.querySelector('.btn-option.active');
            const tones = { 'Экспертный': 'expert', 'Дружелюбный': 'engaging', 'Провокационный': 'casual' };
            toast('info', 'Запуск', 'AI анализирует целевые каналы...');
            try {
                await api.post('/commenting/start', {
                    channels: channels.split(',').map(c => c.trim()),
                    tone: tones[activeTone?.textContent.trim()] || 'expert',
                    model: document.getElementById('comment-model').value,
                    frequency: document.getElementById('comment-frequency').value || 'every_2nd'
                });
                toast('success', 'Нейрокомментинг запущен', 'AI генерирует и публикует комментарии');
                setTimeout(loadCommentLog, 5000);
            } catch (err) {
                toast('error', 'Ошибка', err.message);
            }
        }

        async function loadCommentLog() {
            const container = document.getElementById('comment-log');
            const indicator = document.getElementById('comment-indicator');
            try {
                const data = await api.get('/commenting/logs');
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-comments"></i><h4>Нет комментариев</h4><p>Запустите нейрокомментинг, чтобы увидеть результат</p></div>';
                    indicator.innerHTML = '<i class="fas fa-circle"></i> Ожидание';
                    return;
                }
                indicator.innerHTML = '<i class="fas fa-circle"></i> ' + data.length + ' комментариев';
                document.getElementById('comment-stats-total').textContent = data.length;
                const channels = [...new Set(data.map(c => c.channel))];
                document.getElementById('comment-stats-channels').textContent = channels.length;
                document.getElementById('comment-stats-engage').textContent = '100%';

                container.innerHTML = data.map(c => {
                    const initials = (c.channel || '??').substring(0, 2).toUpperCase();
                    const time = c.time ? timeAgo(c.time) : 'только что';
                    const comment = c.comment || '...';
                    return '<div class="comment-item">' +
                        '<div class="comment-channel">' +
                            '<span class="avatar avatar-sm avatar-gradient">' + initials + '</span>' +
                            '<div>' +
                                '<div class="text-sm" style="font-weight: 600;">@' + c.channel + '</div>' +
                                '<div class="text-xs text-secondary">' + time + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="comment-text">' + escapeHtml(comment) +
                            '<span class="status-badge badge-ai" style="color: #05050A;">AI</span>' +
                        '</div>' +
                        '<div class="comment-metrics">' +
                            '<span><i class="fas fa-thumbs-up"></i> ' + (c.likes || 0) + '</span>' +
                            '<span><i class="fas fa-reply"></i> ' + (c.replies || 0) + '</span>' +
                        '</div>' +
                    '</div>';
                }).join('');
            } catch (err) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h4>Ошибка</h4><p>' + escapeHtml(err.message) + '</p></div>';
            }
        }

        function timeAgo(ts) {
            const sec = Math.floor((Date.now() / 1000) - ts);
            if (sec < 60) return 'только что';
            if (sec < 3600) return Math.floor(sec / 60) + ' мин назад';
            if (sec < 86400) return Math.floor(sec / 3600) + ' ч назад';
            return Math.floor(sec / 86400) + ' дн назад';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadCommentLog();
            setInterval(loadCommentLog, 30000);
        });
    </script>
</body>
</html>
