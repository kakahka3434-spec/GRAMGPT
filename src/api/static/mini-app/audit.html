<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRAMGPT — Audit Log</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header animate-in">
        <h2><i class="fas fa-clock-rotate-left" style="background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i> Аудит лог</h2>
        <a href="index.html" style="color: var(--text-secondary); text-decoration: none; font-size: 13px;"><i class="fas fa-arrow-left"></i> Назад</a>
    </div>

    <!-- Filters -->
    <div class="glass-card animate-in" style="animation-delay: 0.03s; padding: 12px 14px;">
        <div style="display: flex; gap: 6px; flex-wrap: wrap;">
            <span style="background: rgba(0,136,204,0.2); color: var(--primary); padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; border: 1px solid var(--primary);">Все</span>
            <span style="background: rgba(48,54,61,0.4); padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; border: 1px solid var(--border);">Парсинг</span>
            <span style="background: rgba(48,54,61,0.4); padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; border: 1px solid var(--border);">Комментинг</span>
            <span style="background: rgba(48,54,61,0.4); padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; border: 1px solid var(--border);">CRM</span>
            <span style="background: rgba(48,54,61,0.4); padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; border: 1px solid var(--border);">Безопасность</span>
            <span style="background: rgba(48,54,61,0.4); padding: 6px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; border: 1px solid var(--border);">Система</span>
        </div>
    </div>

    <div class="section-title animate-in" style="animation-delay: 0.05s">События</div>

    <div class="card animate-in" style="animation-delay: 0.07s; padding: 0;" id="audit-events-container">
        <div style="padding: 20px; text-align: center; color: var(--text-secondary); font-size: 13px;"><i class="fas fa-spinner"></i> Загрузка...</div>
    </div>

    <div class="section-title animate-in" style="animation-delay: 0.1s">Статистика</div>
    <div class="card animate-in" style="animation-delay: 0.12s; padding: 14px 16px;" id="audit-stats">
        <div style="display: flex; gap: 8px; flex-wrap: wrap; font-size: 10px;">
            <span style="background: rgba(48,54,61,0.4); padding: 4px 8px; border-radius: 6px;">Нет данных</span>
        </div>
    </div>

    <!-- Export -->
    <button class="btn btn-secondary animate-in" style="animation-delay: 0.14s;">
        <i class="fas fa-download"></i> Экспорт лога (CSV)
    </button>

    <div class="nav-bar">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i></a>
        <a href="campaigns.html" class="nav-item"><i class="fas fa-list"></i></a>
        <a href="channel.html" class="nav-item"><i class="fas fa-tv"></i></a>
        <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i></a>
        <a href="settings.html" class="nav-item"><i class="fas fa-cog"></i></a>
    </div>
<script src='main.js'></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const data = await api.get('/audit/events');
            const container = document.getElementById('audit-events-container');
            if (data.events && data.events.length) {
                container.innerHTML = data.events.map((ev, i) => {
                    const modIcon = ev.module === 'crm' ? 'fa-user-plus' : ev.module === 'parsing' ? 'fa-crosshairs' : ev.module === 'commenting' ? 'fa-comments' : ev.module === 'security' ? 'fa-shield-halved' : 'fa-info';
                    const modColor = ev.module === 'crm' ? 'var(--success)' : ev.module === 'parsing' ? 'var(--primary)' : ev.module === 'commenting' ? 'var(--accent)' : ev.module === 'security' ? 'var(--warning)' : 'var(--text-secondary)';
                    return '<div style="padding: 14px 16px;' + (i < data.events.length - 1 ? ' border-bottom: 1px solid var(--border);' : '') + '"><div style="display: flex; gap: 12px; align-items: flex-start;"><div style="width: 32px; height: 32px; border-radius: 8px; background: rgba(48,54,61,0.3); display: flex; align-items: center; justify-content: center; flex-shrink: 0;"><i class="fas ' + modIcon + '" style="color: ' + modColor + '; font-size: 13px;"></i></div><div style="flex: 1;"><div style="display: flex; justify-content: space-between;"><div style="font-size: 13px; font-weight: 600;">' + (ev.title || '') + '</div><span style="font-size: 10px; color: var(--text-secondary);">' + (ev.time || ev.created_at || '') + '</span></div><div style="font-size: 11px; color: var(--text-secondary); margin-top: 2px;">' + (ev.message || ev.details || '') + '</div><div style="display: flex; gap: 6px; margin-top: 6px;"><span style="background: rgba(48,54,61,0.3); padding: 2px 6px; border-radius: 4px; font-size: 9px; color: ' + modColor + ';">' + (ev.module || 'system') + '</span></div></div></div></div>';
                }).join('');
            } else {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary); font-size: 13px;"><i class="fas fa-inbox"></i> Нет событий</div>';
            }
            if (data.total !== undefined) {
                document.getElementById('audit-stats').innerHTML = '<div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span style="font-size: 13px; font-weight: 600;">Всего событий</span><span style="font-size: 12px; color: var(--primary); font-weight: 600;">' + data.total + '</span></div><div style="display: flex; gap: 8px; flex-wrap: wrap; font-size: 10px;">' + (data.breakdown ? Object.entries(data.breakdown).map(([k, v]) => '<span style="background: rgba(48,54,61,0.3); padding: 4px 8px; border-radius: 6px; color: var(--text-secondary);">' + k + ': ' + v + '</span>').join('') : '<span style="background: rgba(48,54,61,0.3); padding: 4px 8px; border-radius: 6px;">Нет данных</span>') + '</div>';
            }
        } catch (e) { console.warn('Audit API error:', e); }
    });
</script>
</body>
</html>
