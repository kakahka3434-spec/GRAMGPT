version: '3.8'

services:
  # --- Reverse Proxy & SSL ---
  traefik:
    image: traefik:v2.10
    container_name: gramgpt-traefik
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ADMIN_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./letsencrypt:/letsencrypt"
    networks:
      - gramgpt-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"

  # --- Database (PostgreSQL) ---
  postgres:
    image: postgres:15-alpine
    container_name: gramgpt-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - gramgpt-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Cache & Broker (Redis) ---
  redis:
    image: redis:7-alpine
    container_name: gramgpt-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - gramgpt-net
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- API Server (FastAPI) ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gramgpt-api
    restart: always
    env_file: .env.prod
    command: >
      sh -c "alembic upgrade head && 
             uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --workers 4"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.gramgpt-api.loadbalancer.server.port=8000"
      - "traefik.http.routers.gramgpt-api.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.gramgpt-api.entrypoints=websecure"
      - "traefik.http.routers.gramgpt-api.tls.certresolver=letsencrypt"
    networks:
      - gramgpt-net

  # --- Background Workers (Celery) ---
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gramgpt-worker
    restart: always
    env_file: .env.prod
    command: celery -A src.core.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      - postgres
      - redis
    networks:
      - gramgpt-net

  # --- Monitoring (Prometheus) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: gramgpt-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prom_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - gramgpt-net

networks:
  gramgpt-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  prom_data:
  letsencrypt:
